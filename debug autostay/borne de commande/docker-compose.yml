version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: fryburger
      POSTGRES_PASSWORD: fryburger_secret
      POSTGRES_DB: fryburger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fryburger:fryburger_secret@db:5432/fryburger
      JWT_SECRET: change-this-to-a-real-secret-in-production
    depends_on:
      - db

volumes:
  pgdata:
